<!DOCTYPE html>
<html lang="en">
<head>
    <title>Transposition Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-4">
        <h3 style="text-align: center; font-weight: bold;">TRANSPOSITION CIPHER</h3>
        <hr>
        <table class="table table-borderless">
            <tr><td style="font-weight: bold; color: blue">ENCRYPTION</td></tr>
            <tr>
                <td>
                    <form method="POST" action="/transposition_encrypt">
                        <div class="form-group">
                            <label>Plain text:</label>
                            <input type="text" class="form-control" name="inputPlainText" required autofocus/>
                        </div>
                        <div class="form-group">
                            <label>Key:</label>
                            <input type="number" class="form-control" name="inputKeyPlain" required/>
                        </div>
                        <button type="submit" class="btn btn-primary">Encrypt</button>
                    </form>
                </td>
            </tr>
            <tr><td style="font-weight: bold; color: blue">DECRYPTION</td></tr>
            <tr>
                <td>
                    <form method="POST" action="/transposition_decrypt">
                        <div class="form-group">
                            <label>Cipher text:</label>
                            <input type="text" class="form-control" name="inputCipherText" required/>
                        </div>
                        <div class="form-group">
                            <label>Key:</label>
                            <input type="number" class="form-control" name="inputKeyCipher" required/>
                        </div>
                        <button type="submit" class="btn btn-success">Decrypt</button>
                    </form>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
